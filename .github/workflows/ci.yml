name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/nightly.yml"
      - ".github/workflows/release.yml"
      - "**/*.md"
      - ".gitignore"
      - "assets/**"
      - "mcpb/**"
      - "plugins/**"
      - ".claude-plugin/**"
      - "iac/**"
      - "LICENSE"
      - ".github/renovate.json5"
      - "xtp-plugin-schema.json"
      - ".hadolint.yaml"
      - "pre-commit-config.yaml"
      - ".zed/**"
      - "lefthook.yml"
      - "AGENTS.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation provides no benefit on fresh CI runners and only
  # bloats the cached target/ directory, so disable it.
  CARGO_INCREMENTAL: 0

permissions:
  contents: read # checkout repository
  packages: read # pull container images for integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-prep:
    name: Prepare Cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Cache target directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/
          # Key on Cargo.lock only (not the commit SHA) so a single cache is
          # reused/overwritten per dependency set instead of creating a new
          # multi-GB entry on every commit.
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: Build all workspace artifacts and tests
        run: |
          cargo check --workspace --all-features --locked
          cargo test --no-run --workspace --all-features --locked

      - name: Prune workspace crate artifacts before caching
        # Drop only this crate's own build outputs (which change every commit)
        # while keeping cached dependency artifacts, so the target cache stays
        # stable across commits instead of growing each run.
        run: cargo clean -p hyper-mcp

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: cache-prep

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Restore cargo registry
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Restore target directory
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: Restore file timestamps
        run: |
          # Update source file timestamps to prevent unnecessary rebuilds
          # This makes cargo think files haven't changed since the cache was created
          git ls-files -z | xargs -0 touch

      - name: Run clippy
        run: cargo clippy --workspace --all-features --locked -- -D warnings

  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    needs: cache-prep

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt -- --check

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: cache-prep

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Free up disk space
        run: |
          # cargo llvm-cov builds a second, fully instrumented copy of the entire
          # dependency graph under target/llvm-cov-target/, which does not fit on the
          # stock ~14 GB runner disk. Reclaim space from preinstalled toolchains we
          # don't use before building.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Restore cargo registry
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      # Note: the regular target/ cache is intentionally NOT restored here. Coverage
      # runs with -C instrument-coverage into a separate target/llvm-cov-target/ tree
      # and cannot reuse those artifacts, so restoring it would only waste disk space.

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install cargo-llvm-cov
        # Built from crates.io against Cargo.lock to keep the trust surface to
        # the Rust toolchain + crates.io (no extra GitHub Action). Renovate bumps
        # the version constraint in PRs.
        run: cargo install cargo-llvm-cov --locked --version ^0.8

      - name: Run tests with coverage
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We only report line coverage, which needs line tables but not full
          # debuginfo. Dropping from debuginfo=2 to line-tables-only drastically
          # shrinks the instrumented build under target/llvm-cov-target/. The test
          # profile inherits debug from dev, so both are pinned for good measure.
          CARGO_PROFILE_DEV_DEBUG: line-tables-only
          CARGO_PROFILE_TEST_DEBUG: line-tables-only
        run: RUST_BACKTRACE=1 cargo llvm-cov --workspace --all-features --locked --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  sbom:
    name: SBOM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx -f json --all-features --override-filename temp

      - name: Clean SBOM
        run: jq '
          del(.metadata.component."bom-ref")
          | del(.metadata.component.purl)
          | del(.metadata.component.components[0]."bom-ref")
          | del(.metadata.component.components[0].purl)
          ' temp.json > sbom.cdx.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        # Authenticate so the cosign base image pulled from ghcr.io is not
        # subject to anonymous pull rate limits.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (no push)
        # Validate that the production image builds end-to-end. Nothing is
        # pushed or loaded; this only proves the Dockerfile and the release
        # build inside it still compile.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64

  # Summary job to check if all required jobs passed
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [clippy, formatting, tests, sbom, docker-build]

    steps:
      - name: All jobs succeeded
        run: echo "All CI jobs passed!"
